<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useCallback, useRef } = React;

/* ============================================================
   WNBA SHARP — game model + prop model, real data only
   Data: ESPN public WNBA API (no keys). Anything unconfirmed = null.
   Game model: opponent-adjusted per-100 efficiency + pace (iterative),
   regressed to league mean, bivariate-normal Monte Carlo (10k).
   Prop model: per-minute rates from real game logs, minutes blend,
   opponent-defense + pace adjustments, normal / Poisson distributions.
   Devig: exact multiplicative. Sizing: quarter Kelly.
   ============================================================ */

const SEASON = 2026;
const SEASON_START = "2026-05-01"; // scan window start; empty dates are skipped
const BASE = "https://site.api.espn.com/apis/site/v2/sports/basketball/wnba";
const WEB = "https://site.web.api.espn.com/apis/common/v3/sports/basketball/wnba";
const SB_URL = (d) => `${BASE}/scoreboard?dates=${d}`;
const SUM_URL = (id) => `${BASE}/summary?event=${id}`;
const ROSTER_URL = (tid) => `${BASE}/teams/${tid}/roster`;
const INJ_URL = `${BASE}/injuries`;
const GL_URL = (aid) => `${WEB}/athletes/${aid}/gamelog?season=${SEASON}`;

/* ---------------- math / odds helpers ---------------- */
const a2d = (a) => (a >= 100 ? 1 + a / 100 : a <= -100 ? 1 + 100 / -a : NaN);
const p2a = (p) =>
  p <= 0 || p >= 1 ? null : p >= 0.5 ? Math.round((-100 * p) / (1 - p)) : Math.round((100 * (1 - p)) / p);
const fmtA = (a) => (a == null || isNaN(a) ? "—" : a > 0 ? `+${a}` : `${a}`);
const devig2 = (aA, aB) => {
  const dA = a2d(aA), dB = a2d(aB);
  if (isNaN(dA) || isNaN(dB)) return [null, null];
  const iA = 1 / dA, iB = 1 / dB, s = iA + iB;
  return [iA / s, iB / s]; // exact multiplicative
};
const evPct = (p, amer) => {
  const d = a2d(amer);
  return isNaN(d) || p == null ? null : (p * d - 1) * 100;
};
const kellyQ = (p, amer) => {
  const d = a2d(amer);
  if (isNaN(d) || p == null) return null;
  const b = d - 1, f = (p * b - (1 - p)) / b;
  return Math.max(0, f / 4) * 100; // % of bankroll, quarter Kelly
};
const normCdf = (z) => {
  const t = 1 / (1 + 0.2316419 * Math.abs(z));
  const dnorm = Math.exp(-z * z / 2) / Math.sqrt(2 * Math.PI);
  const poly = t * (0.31938153 + t * (-0.356563782 + t * (1.781477937 + t * (-1.821255978 + t * 1.330274429))));
  const p = 1 - dnorm * poly;
  return z >= 0 ? p : 1 - p;
};
const pOverNormal = (line, mu, sd) => 1 - normCdf((line - mu) / sd);
const poisCdf = (k, lam) => {
  let s = 0, term = Math.exp(-lam);
  for (let i = 0; i <= k; i++) { s += term; term *= lam / (i + 1); }
  return s;
};
function mulberry32(a) {
  return function () {
    a |= 0; a = (a + 0x6d2b79f5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function hashStr(s) {
  let h = 2166136261;
  for (let i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 16777619); }
  return h >>> 0;
}
let _rng = Math.random; // simGame swaps in a seeded generator for determinism
let _spare = null;
const randn = () => {
  if (_spare != null) { const v = _spare; _spare = null; return v; }
  let u = 0, v = 0;
  while (u === 0) u = _rng();
  while (v === 0) v = _rng();
  const m = Math.sqrt(-2 * Math.log(u)), a = 2 * Math.PI * v;
  _spare = m * Math.sin(a);
  return m * Math.cos(a);
};
const clamp = (x, lo, hi) => Math.min(hi, Math.max(lo, x));
// normalize names for injury matching (accents, punctuation, Jr/Sr/III suffixes)
const normName = (s) => (s || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[.'`’\-]/g, "").replace(/\b(jr|sr|ii|iii|iv|v)\b/g, "").replace(/\s+/g, " ").trim();
// normalize varied injury status text to the model's vocabulary
const normStatus = (s) => {
  const t = (s || "").toLowerCase();
  if (/season|out\b|inactive/.test(t)) return "out";
  if (/doubt/.test(t)) return "doubtful";
  if (/quest|game.?time|gtd|day.?to.?day/.test(t)) return "questionable";
  if (/prob/.test(t)) return "probable";
  return t || "listed";
};
// tolerant parser for SportRadar league/injuries.json (schema-defensive)
function parseSRInjuries(json) {
  const map = {};
  const teams = json.teams || json.league?.teams || json.injuries || [];
  for (const t of teams) {
    const players = t.players || t.team?.players || [];
    for (const p of players) {
      const nm = p.full_name || p.name || `${p.first_name || ""} ${p.last_name || ""}`.trim();
      const injs = p.injuries || (p.injury ? [p.injury] : []);
      if (!nm || !injs.length) continue;
      const raw = injs[0].status || injs[0].desc || injs[0].comment || "listed";
      map[normName(nm)] = { status: normStatus(raw), note: injs[0].desc || injs[0].comment || "", src: "SR", raw };
    }
  }
  return map;
}
const mean = (a) => (a.length ? a.reduce((s, x) => s + x, 0) / a.length : null);
const sdOf = (a) => {
  if (a.length < 2) return null;
  const m = mean(a);
  return Math.sqrt(a.reduce((s, x) => s + (x - m) ** 2, 0) / (a.length - 1));
};
const f1 = (x) => (x == null || isNaN(x) ? "—" : x.toFixed(1));
const pct = (p) => (p == null ? "—" : (p * 100).toFixed(1) + "%");

/* ---------------- persistent storage (window.storage) ---------------- */
const store = {
  async get(k) {
    try { const r = localStorage.getItem(k); return r != null ? JSON.parse(r) : null; } catch (e) { return null; }
  },
  async set(k, v) {
    try { localStorage.setItem(k, JSON.stringify(v)); } catch (e) { /* quota */ }
  },
};
const K_GAMES = "wnba26-games-v2";
const K_LOG = "wnba26-betlog-v1";
const K_GL = "wnba26-gamelogs-v1";
const K_ROSTERS = "wnba26-rosters-v1";
const K_LEDGER = "wnba26-ledger-v1";
const K_SRPROXY = "wnba26-srproxy-v1";
const K_CALIB = "wnba26-calib-v2";

/* ---------------- fetch helpers ---------------- */
async function fjson(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`${r.status} ${url}`);
  return r.json();
}
async function pool(items, limit, fn, onProg) {
  const out = new Array(items.length);
  let i = 0, done = 0;
  async function worker() {
    while (i < items.length) {
      const idx = i++;
      try { out[idx] = await fn(items[idx], idx); } catch (e) { out[idx] = null; }
      done++; onProg && onProg(done, items.length);
    }
  }
  await Promise.all(Array.from({ length: Math.min(limit, items.length) }, worker));
  return out;
}
const ymd = (dt) => dt.toISOString().slice(0, 10).replace(/-/g, "");
const ymdET = (iso) => new Date(iso).toLocaleDateString("en-CA", { timeZone: "America/New_York" }).replace(/-/g, "");
const todayET = () => new Date().toLocaleDateString("en-CA", { timeZone: "America/New_York" }).replace(/-/g, "");
const addDaysYmd = (y, n) => {
  const d = new Date(Date.UTC(+y.slice(0, 4), +y.slice(4, 6) - 1, +y.slice(6, 8)));
  d.setUTCDate(d.getUTCDate() + n);
  return ymd(d);
};
function dateRange(fromYmd, toYmd) {
  const out = [];
  const d = new Date(`${fromYmd.slice(0, 4)}-${fromYmd.slice(4, 6)}-${fromYmd.slice(6, 8)}T12:00:00Z`);
  while (ymd(d) <= toYmd) { out.push(ymd(d)); d.setUTCDate(d.getUTCDate() + 1); }
  return out;
}

/* ---------------- ESPN parsing ---------------- */
function parseScoreboardEvent(ev) {
  const c = ev.competitions && ev.competitions[0];
  if (!c) return null;
  const home = c.competitors.find((x) => x.homeAway === "home");
  const away = c.competitors.find((x) => x.homeAway === "away");
  if (!home || !away) return null;
  const oddsArr = c.odds || [];
  const o = oddsArr.find((x) => x.overUnder != null || x.spread != null || x.homeTeamOdds) || oddsArr[0] || null;
  let spread = null, total = null, mlH = null, mlA = null, spH = null, spA = null, totO = null, totU = null;
  if (o) {
    if (typeof o.spread === "number") spread = o.spread;
    else if (o.details) {
      const m = /([A-Z]{2,4})\s*(-?\d+(\.\d+)?)/.exec(o.details);
      if (m) spread = m[1] === (home.team.abbreviation || "").toUpperCase() ? parseFloat(m[2]) : -parseFloat(m[2]);
    }
    if (typeof o.overUnder === "number") total = o.overUnder;
    mlH = o.homeTeamOdds?.moneyLine ?? o.current?.home?.moneyLine?.american ?? null;
    mlA = o.awayTeamOdds?.moneyLine ?? o.current?.away?.moneyLine?.american ?? null;
    spH = o.homeTeamOdds?.spreadOdds ?? null;
    spA = o.awayTeamOdds?.spreadOdds ?? null;
    totO = o.overOdds ?? null;
    totU = o.underOdds ?? null;
    if (typeof mlH === "string") mlH = parseInt(mlH, 10);
    if (typeof mlA === "string") mlA = parseInt(mlA, 10);
  }
  return {
    id: ev.id,
    date: ev.date,
    d: ymdET(ev.date),
    seasonType: ev.season?.type ?? null,
    name: ev.name || ev.shortName || "",
    state: ev.status?.type?.state || "pre",
    statusTxt: ev.status?.type?.shortDetail || "",
    completed: !!ev.status?.type?.completed,
    home: { id: home.team.id, ab: home.team.abbreviation, name: home.team.shortDisplayName || home.team.displayName, pts: home.score != null ? +home.score : null },
    away: { id: away.team.id, ab: away.team.abbreviation, name: away.team.shortDisplayName || away.team.displayName, pts: away.score != null ? +away.score : null },
    odds: o ? { spread, total, mlH, mlA, spH, spA, totO, totU, provider: o.provider?.name || null } : null,
  };
}
// regular season + playoffs only — preseason and All-Star never touch the model
const isModelGame = (pe) => pe && pe.seasonType !== 1 && !/all-star/i.test(pe.name);
function statVal(stats, name) {
  const s = stats.find((x) => x.name === name);
  return s ? s.displayValue : null;
}
function teamPossFromBox(stats) {
  // poss = FGA + 0.44*FTA - ORB + TO  (real box only; null if any piece missing)
  const fg = statVal(stats, "fieldGoalsMade-fieldGoalsAttempted");
  const ft = statVal(stats, "freeThrowsMade-freeThrowsAttempted");
  const orb = statVal(stats, "offensiveRebounds");
  const to = statVal(stats, "turnovers") ?? statVal(stats, "totalTurnovers");
  if (!fg || !ft || orb == null || to == null) return null;
  const fga = parseInt(fg.split("-")[1], 10);
  const fta = parseInt(ft.split("-")[1], 10);
  const orbN = parseFloat(orb), toN = parseFloat(to);
  if ([fga, fta, orbN, toN].some((x) => isNaN(x))) return null;
  return fga + 0.44 * fta - orbN + toN;
}

/* ---------------- ratings (opponent-adjusted, regressed) ---------------- */
function buildRatings(games, iters = 40) {
  const rows = []; // {t, opp, ortg, poss, home, date, wt}
  const teams = {};
  const dated = games.filter((g) => g.hPts != null && g.aPts != null);
  const lastDateY = dated.length ? (dated[dated.length - 1].d || ymdET(dated[dated.length - 1].date)) : todayET();
  const dayNum = (y) => {
    const yy = y || todayET();
    return Math.floor(Date.UTC(+yy.slice(0, 4), +yy.slice(4, 6) - 1, +yy.slice(6, 8)) / 86400000);
  };
  const refDay = dayNum(lastDateY);
  const HALFLIFE = 23; // days — recent form weighted ~2x vs 3+ weeks old
  const lastGame = {}; // teamId -> most recent ymd played
  for (const g of dated) {
    teams[g.hId] = g.hAb; teams[g.aId] = g.aAb;
    const gy = g.d || ymdET(g.date);
    if (!lastGame[g.hId] || gy > lastGame[g.hId]) lastGame[g.hId] = gy;
    if (!lastGame[g.aId] || gy > lastGame[g.aId]) lastGame[g.aId] = gy;
    if (g.hPoss && g.aPoss) {
      const gp = (g.hPoss + g.aPoss) / 2;
      const wt = Math.pow(0.5, (refDay - dayNum(gy)) / HALFLIFE);
      rows.push({ t: g.hId, opp: g.aId, ortg: (g.hPts / gp) * 100, poss: gp, home: 1, wt });
      rows.push({ t: g.aId, opp: g.hId, ortg: (g.aPts / gp) * 100, poss: gp, home: 0, wt });
    }
  }
  if (rows.length < 8) return null;
  const wmean = (arr) => {
    let s = 0, w = 0;
    for (const x of arr) { s += x.v * x.w; w += x.w; }
    return w ? s / w : null;
  };
  const lg = wmean(rows.map((r) => ({ v: r.ortg, w: r.wt })));
  const lgPace = wmean(rows.map((r) => ({ v: r.poss, w: r.wt })));
  const ids = Object.keys(teams);
  const adjO = {}, adjD = {}, pace = {};
  ids.forEach((id) => { adjO[id] = lg; adjD[id] = lg; pace[id] = lgPace; });
  const K = 6;
  for (let it = 0; it < iters; it++) {
    const nO = {}, nD = {}, nP = {};
    for (const id of ids) {
      const off = rows.filter((r) => r.t === id);
      const def = rows.filter((r) => r.opp === id);
      const oAdj = off.map((r) => ({ v: r.ortg - (adjD[r.opp] - lg), w: r.wt }));
      const dAdj = def.map((r) => ({ v: r.ortg - (adjO[r.t] - lg), w: r.wt }));
      const pAdj = off.map((r) => ({ v: r.poss - (pace[r.opp] - lgPace), w: r.wt }));
      const wEff = off.reduce((s, r) => s + r.wt, 0);
      const wDef = def.reduce((s, r) => s + r.wt, 0);
      const wO = wEff / (wEff + K), wD = wDef / (wDef + K);
      nO[id] = lg + wO * ((wmean(oAdj) ?? lg) - lg);
      nD[id] = lg + wD * ((wmean(dAdj) ?? lg) - lg);
      nP[id] = lgPace + wO * ((wmean(pAdj) ?? lgPace) - lgPace);
    }
    ids.forEach((id) => { adjO[id] = nO[id]; adjD[id] = nD[id]; pace[id] = nP[id]; });
  }
  const margins = dated.map((g) => g.hPts - g.aPts);
  const obs = mean(margins) ?? 2.0;
  const hca = (margins.length * obs + 25 * 2.0) / (margins.length + 25);
  const gp = {};
  ids.forEach((id) => (gp[id] = rows.filter((r) => r.t === id).length));
  return { lg, lgPace, hca, teams, adjO, adjD, pace, gp, lastGame, nGames: rows.length / 2 };
}

// rest/schedule points adjustment from days between games (WNBA B2Bs are punishing)
function restPts(daysRest) {
  if (daysRest == null) return 0;
  if (daysRest <= 1) return -1.7;   // back-to-back (played yesterday)
  if (daysRest === 2) return -0.4;
  if (daysRest === 3) return 0.2;
  return 0.5;                        // 4+ days rest
}

/* ---------------- Monte Carlo game sim ---------------- */
function simGame(rt, hId, aId, adj = {}, calib = null, n = 20000) {
  if (!rt || !rt.adjO[hId] || !rt.adjO[aId]) return null;
  _rng = mulberry32(hashStr(`${hId}-${aId}-wnba26`)); _spare = null; // deterministic per matchup
  const lg = rt.lg, lgP = rt.lgPace;
  const expPace = clamp(rt.pace[hId] + rt.pace[aId] - lgP, lgP - 8, lgP + 8);
  const hEff = lg + (rt.adjO[hId] - lg) + (rt.adjD[aId] - lg);
  const aEff = lg + (rt.adjO[aId] - lg) + (rt.adjD[hId] - lg);
  let hMu = (expPace * hEff) / 100 + rt.hca / 2 + (adj.hRest || 0) - (adj.hInjPts || 0);
  let aMu = (expPace * aEff) / 100 - rt.hca / 2 + (adj.aRest || 0) - (adj.aInjPts || 0);
  // ---- self-calibration from the walk-forward backtest (margin & total fit independently) ----
  const baseSD = 10.3 * Math.sqrt(expPace / lgP);
  const rhoPrior = 0.18;
  let priorMarginSD = baseSD * Math.sqrt(2 * (1 - rhoPrior));
  let priorTotalSD = baseSD * Math.sqrt(2 * (1 + rhoPrior));
  let marginSD = priorMarginSD, totalSD = priorTotalSD;
  let calOn = false;
  if (calib && calib.n >= 30) {
    calOn = true;
    const shrink = calib.n / (calib.n + 25); // trust the fit more as the sample grows
    const applyFit = (raw, fit, prior) => {
      if (!fit) return raw;
      const b = shrink * fit.b + (1 - shrink) * 1;      // slope -> 1 at low n
      const a = shrink * fit.a;                          // intercept -> 0 at low n
      return a + b * raw;
    };
    const rawMargin = hMu - aMu, rawTotal = hMu + aMu;
    const calMargin = applyFit(rawMargin, calib.marginFit, priorMarginSD);
    const calTotal = applyFit(rawTotal, calib.totalFit, priorTotalSD);
    // rebuild means so they hit the calibrated margin AND total exactly
    hMu = (calTotal + calMargin) / 2;
    aMu = (calTotal - calMargin) / 2;
    // size each spread to its own empirical residual error
    if (calib.marginFit?.residSD) marginSD = shrink * calib.marginFit.residSD + (1 - shrink) * priorMarginSD;
    if (calib.totalFit?.residSD) totalSD = shrink * calib.totalFit.residSD + (1 - shrink) * priorTotalSD;
  }
  // solve per-team SD + correlation that reproduce the target margin and total spreads
  const sd = Math.sqrt(Math.max((marginSD ** 2 + totalSD ** 2) / 4, 1));
  const rho = clamp((totalSD ** 2 - marginSD ** 2) / (totalSD ** 2 + marginSD ** 2), -0.4, 0.6);
  const minGP = Math.min(rt.gp?.[hId] ?? 20, rt.gp?.[aId] ?? 20);
  const sdEff = sd * (1 + 0.6 / Math.sqrt(minGP + 1)); // extra width when these teams have few games
  const q = Math.sqrt(1 - rho * rho);
  const margins = new Float64Array(n), totals = new Float64Array(n);
  let hw = 0;
  for (let i = 0; i < n; i++) {
    const z1 = randn(), z2 = rho * z1 + q * randn();
    const hs = hMu + sdEff * z1, as = aMu + sdEff * z2;
    margins[i] = hs - as; totals[i] = hs + as;
    if (hs > as) hw++;
  }
  const ms = Array.from(margins).sort((a, b) => a - b);
  return {
    expPace, hMu, aMu, adj, calibrated: calOn,
    pHomeML: hw / n,
    fairSpread: -ms[Math.floor(n / 2)],
    fairTotal: (hMu + aMu),
    pHomeCover: (sp) => { let c = 0; for (let i = 0; i < n; i++) if (margins[i] + sp > 0) c++; return c / n; },
    pOver: (t) => { let c = 0; for (let i = 0; i < n; i++) if (totals[i] > t) c++; return c / n; },
  };
}

// per-game adjustments from schedule (rest) + cached game logs & injuries (availability)
function gameAdjustments(g, rt, glCache, injuries, rosters) {
  const out = { hRest: 0, aRest: 0, hInjPts: 0, aInjPts: 0, outNames: { h: [], a: [] }, haveLogs: false };
  if (!rt) return out;
  const slateY = g.d || ymdET(g.date);
  const dn = (y) => Math.floor(Date.UTC(+y.slice(0, 4), +y.slice(4, 6) - 1, +y.slice(6, 8)) / 86400000);
  const restOf = (id) => (rt.lastGame?.[id] ? dn(slateY) - dn(rt.lastGame[id]) : null);
  out.hRest = restPts(restOf(g.home.id));
  out.aRest = restPts(restOf(g.away.id));
  // injury point loss: out players' recent scoring × leakage (replacements absorb the rest)
  const LEAK = 0.42;
  const recentPPG = (gl) => {
    const gms = (gl || []).filter((x) => x.min > 0 && x.pts != null).slice(-6);
    return gms.length >= 3 ? mean(gms.map((x) => x.pts)) : null;
  };
  const teamLoss = (roster) => {
    let lost = 0, names = [], any = false;
    for (const p of roster || []) {
      const log = glCache[p.id]?.gl;
      if (log) any = true;
      const inj = injuries[normName(p.name)];
      if (inj && /^(out|doubtful)/i.test(inj.status)) {
        const ppg = recentPPG(log);
        if (ppg != null) { lost += ppg * LEAK; names.push(`${p.name} (${ppg.toFixed(1)})`); }
      }
    }
    return { lost, names, any };
  };
  if (rosters) {
    const h = teamLoss(rosters[g.home.id]);
    const a = teamLoss(rosters[g.away.id]);
    out.hInjPts = h.lost; out.aInjPts = a.lost;
    out.outNames = { h: h.names, a: a.names };
    out.haveLogs = h.any || a.any;
  }
  return out;
}

// fast analytic prediction (no MC) for walk-forward backtesting
function predictAnalytic(rt, hId, aId, restAdj) {
  if (!rt || !rt.adjO[hId] || !rt.adjO[aId]) return null;
  const lg = rt.lg, lgP = rt.lgPace;
  const expPace = clamp(rt.pace[hId] + rt.pace[aId] - lgP, lgP - 8, lgP + 8);

// walk-forward: predict each game using ONLY games before it. Real out-of-sample validation.
function runBacktest(games) {
  const done = games.filter((g) => g.hPts != null && g.aPts != null && g.hPoss && g.aPoss)
    .sort((a, b) => a.date.localeCompare(b.date));
  const dn = (y) => Math.floor(Date.UTC(+y.slice(0, 4), +y.slice(4, 6) - 1, +y.slice(6, 8)) / 86400000);
  let nMargin = 0, sumAbsM = 0, sumBiasM = 0, sumAbsT = 0, sumBiasT = 0, suCorrect = 0, suN = 0, sumSqM = 0, sumSqT = 0;

  const buckets = Array.from({ length: 10 }, () => ({ n: 0, w: 0, p: 0 }));
  const lastGame = {};
  for (let i = 0; i < done.length; i++) {
    const g = done[i];
    const gy = g.d || ymdET(g.date);
    const prior = done.slice(0, i);
    const gpH = prior.filter((p) => p.hId === g.hId || p.aId === g.hId).length;
    const gpA = prior.filter((p) => p.hId === g.aId || p.aId === g.aId).length;
    if (gpH >= 4 && gpA >= 4) {
      const rt = buildRatings(prior, 22);
      const rest = {
        h: lastGame[g.hId] != null ? restPts(dn(gy) - lastGame[g.hId]) : 0,
        a: lastGame[g.aId] != null ? restPts(dn(gy) - lastGame[g.aId]) : 0,
      };
      const pr = rt && predictAnalytic(rt, g.hId, g.aId, rest);
      if (pr) {
        const actM = g.hPts - g.aPts, actTt = g.hPts + g.aPts;
        sumAbsM += Math.abs(pr.margin - actM); sumBiasM += pr.margin - actM; sumSqM += (pr.margin - actM) ** 2;
        sumAbsT += Math.abs(pr.total - actTt); sumBiasT += pr.total - actTt; sumSqT += (pr.total - actTt) ** 2;
        predList.push(pr.margin); actList.push(actM); predT.push(pr.total); actT.push(actTt); nMargin++;
        const homeWon = actM > 0 ? 1 : 0;
        if ((pr.pHome >= 0.5 ? 1 : 0) === homeWon) suCorrect++;
        suN++;
        const b = Math.min(9, Math.floor(pr.pHome * 10));
        buckets[b].n++; buckets[b].w += homeWon; buckets[b].p += pr.pHome;
      }
    }
    lastGame[g.hId] = dn(gy); lastGame[g.aId] = dn(gy);
  }
  let corr = null;
  if (predList.length > 3) {
    const mp = mean(predList), ma = mean(actList);
    let cov = 0, vp = 0, va = 0;
    for (let i = 0; i < predList.length; i++) { cov += (predList[i] - mp) * (actList[i] - ma); vp += (predList[i] - mp) ** 2; va += (actList[i] - ma) ** 2; }
    corr = cov / Math.sqrt(vp * va);
  }
  // least-squares fit  actual ≈ a + b·predicted  (+ residual SD) for margin and total separately
  const linFit = (pred, act) => {
    const n = pred.length;
    if (n < 12) return { a: 0, b: 1, residSD: null, n };
    const mp = mean(pred), ma = mean(act);
    let cov = 0, vp = 0;
    for (let i = 0; i < n; i++) { cov += (pred[i] - mp) * (act[i] - ma); vp += (pred[i] - mp) ** 2; }
    const b = vp > 1e-6 ? cov / vp : 1;
    const a = ma - b * mp;
    let ss = 0;
    for (let i = 0; i < n; i++) { const r = act[i] - (a + b * pred[i]); ss += r * r; }
    return { a, b, residSD: Math.sqrt(ss / (n - 2)), n };
  };
  return {
    n: nMargin,
    marginMAE: nMargin ? sumAbsM / nMargin : null,
    marginRMSE: nMargin ? Math.sqrt(sumSqM / nMargin) : null,
    marginBias: nMargin ? sumBiasM / nMargin : null,
    totalMAE: nMargin ? sumAbsT / nMargin : null,
    totalRMSE: nMargin ? Math.sqrt(sumSqT / nMargin) : null,
    totalBias: nMargin ? sumBiasT / nMargin : null,
    marginFit: linFit(predList, actList),
    totalFit: linFit(predT, actT),
    suAcc: suN ? suCorrect / suN : null,
    corr,
    buckets: buckets.filter((b) => b.n > 0).map((b) => ({ pred: b.p / b.n, act: b.w / b.n, n: b.n })),
  };
}

/* ---------------- auto model ledger (CLV vs close, unbiased) ---------------- */
function updateLedger(prev, slate, sims) {
  const next = { ...prev };
  let changed = false;
  for (const g of slate) {
    const sim = sims[g.id]; const o = g.odds;
    if (!sim) continue;
    const margin = g.home.pts != null && g.away.pts != null ? g.home.pts - g.away.pts : null;
    const total = g.home.pts != null && g.away.pts != null ? g.home.pts + g.away.pts : null;
    let e = next[g.id];
    const isPre = g.state === "pre";
    if (!e) {
      if (!o) continue; // wait for a posted line before capturing
      const sp = o.spread, tt = o.total;
      const spH = o.spH ?? (sp != null ? -110 : null), spA = o.spA ?? (sp != null ? -110 : null);
      const totO = o.totO ?? (tt != null ? -110 : null), totU = o.totU ?? (tt != null ? -110 : null);
      e = { gid: g.id, date: g.date, away: g.away.ab, home: g.home.ab, capTs: Date.now(), mkts: {}, started: false, final: false };
      if (sp != null) { const side = sim.pHomeCover(sp) >= 0.5 ? "H" : "A"; e.mkts.spread = { side, model: -sim.fairSpread, openSp: sp, openPrice: side === "H" ? spH : spA, lastSp: sp, lastPrice: side === "H" ? spH : spA }; }
      if (tt != null) { const side = sim.pOver(tt) >= 0.5 ? "O" : "U"; e.mkts.total = { side, model: sim.fairTotal, openTot: tt, openPrice: side === "O" ? totO : totU, lastTot: tt, lastPrice: side === "O" ? totO : totU }; }
      if (o.mlH != null && o.mlA != null) { const side = sim.pHomeML >= 0.5 ? "H" : "A"; e.mkts.ml = { side, model: side === "H" ? sim.pHomeML : 1 - sim.pHomeML, openH: o.mlH, openA: o.mlA, lastH: o.mlH, lastA: o.mlA }; }
      if (Object.keys(e.mkts).length) { next[g.id] = e; changed = true; }
      continue;
    }
    if (isPre && !e.started && o) {
      const sp = o.spread, tt = o.total;
      const spH = o.spH ?? (sp != null ? -110 : null), spA = o.spA ?? (sp != null ? -110 : null);
      const totO = o.totO ?? (tt != null ? -110 : null), totU = o.totU ?? (tt != null ? -110 : null);
      if (e.mkts.spread && sp != null) { e.mkts.spread.lastSp = sp; e.mkts.spread.lastPrice = e.mkts.spread.side === "H" ? spH : spA; changed = true; }
      if (e.mkts.total && tt != null) { e.mkts.total.lastTot = tt; e.mkts.total.lastPrice = e.mkts.total.side === "O" ? totO : totU; changed = true; }
      if (e.mkts.ml && o.mlH != null && o.mlA != null) { e.mkts.ml.lastH = o.mlH; e.mkts.ml.lastA = o.mlA; changed = true; }
    }
    if (!isPre && !e.started) { // game tipped -> freeze last seen line as the close
      e.started = true;
      if (e.mkts.spread) { e.mkts.spread.closeSp = e.mkts.spread.lastSp; e.mkts.spread.closePrice = e.mkts.spread.lastPrice; }
      if (e.mkts.total) { e.mkts.total.closeTot = e.mkts.total.lastTot; e.mkts.total.closePrice = e.mkts.total.lastPrice; }
      if (e.mkts.ml) { e.mkts.ml.closeH = e.mkts.ml.lastH; e.mkts.ml.closeA = e.mkts.ml.lastA; }
      changed = true;
    }
    if (g.completed && margin != null && !e.final) {
      e.final = true; e.score = `${g.away.pts}-${g.home.pts}`;
      if (e.mkts.spread) { const cs = e.mkts.spread.closeSp ?? e.mkts.spread.lastSp; const cov = margin + cs; e.mkts.spread.result = e.mkts.spread.side === "H" ? (cov > 0 ? "W" : cov < 0 ? "L" : "P") : (cov < 0 ? "W" : cov > 0 ? "L" : "P"); }
      if (e.mkts.total) { const ct = e.mkts.total.closeTot ?? e.mkts.total.lastTot; e.mkts.total.result = e.mkts.total.side === "O" ? (total > ct ? "W" : total < ct ? "L" : "P") : (total < ct ? "W" : total > ct ? "L" : "P"); }
      if (e.mkts.ml) { e.mkts.ml.result = e.mkts.ml.side === "H" ? (margin > 0 ? "W" : "L") : (margin < 0 ? "W" : "L"); }
      changed = true;
    }
  }
  return changed ? next : prev;
}
const spreadClvPts = (m) => { const c = m.closeSp ?? m.lastSp; return m.side === "H" ? m.openSp - c : c - m.openSp; };

  const [pH, pA] = devig2(cH, cA);

function parseGamelog(json) {
  const names = json.names || [];
  const idx = (n) => names.indexOf(n);
  const iMin = idx("minutes"), iPts = idx("points"), iReb = idx("rebounds"), iAst = idx("assists");
  const iTpm = names.findIndex((n) => n.startsWith("threePointFieldGoalsMade"));
  const evMeta = json.events || {};
  const rows = [];
  for (const st of json.seasonTypes || []) {
    for (const cat of st.categories || []) {
      for (const ev of cat.events || []) {
        const s = ev.stats || [];
        const g = (i, split) => {
          if (i < 0 || s[i] == null) return null;
          const v = split ? String(s[i]).split("-")[0] : s[i];
          const num = parseFloat(v);
          return isNaN(num) ? null : num;
        };
        const min = g(iMin);
        if (min == null) continue;
        rows.push({
          eventId: ev.eventId,
          date: evMeta[ev.eventId]?.gameDate || null,
          min, pts: g(iPts), reb: g(iReb), ast: g(iAst), tpm: g(iTpm, true),
        });
      }
    }
  }
  rows.sort((a, b) => (a.date || "").localeCompare(b.date || ""));
  return rows;
}
function projectPlayer(gl, ctx) {
  // ctx: { oppDefFactor, paceFactor }
  const g = gl.filter((x) => x.min != null && x.min > 0 && x.pts != null);
  if (g.length < 5) return null; // insufficient real sample -> null, never estimated
  const last5 = g.slice(-5);
  const minProj = 0.6 * mean(last5.map((x) => x.min)) + 0.4 * mean(g.map((x) => x.min));
  // empirical-Bayes shrinkage: thin samples regress toward the player's full-season rate
  const SHRINK = 4; // pseudo-games of prior weight
  const rate = (key) => {
    const seasonRate = mean(g.map((x) => x[key])) / mean(g.map((x) => x.min));
    const recentRate = mean(last5.map((x) => x[key])) / mean(last5.map((x) => x.min));
    const blended = 0.65 * seasonRate + 0.35 * recentRate;
    // shrink the recency tilt back toward season mean when sample is small
    const w = g.length / (g.length + SHRINK);
    return w * blended + (1 - w) * seasonRate;
  };
  const dF = ctx.oppDefFactor, pF = ctx.paceFactor;
  const mu = {
    pts: rate("pts") * minProj * dF * pF,
    reb: rate("reb") * minProj * Math.sqrt(dF) * pF,
    ast: rate("ast") * minProj * Math.sqrt(dF) * pF,
    tpm: g.every((x) => x.tpm == null) ? null : rate("tpm") * minProj * dF * pF,
  };
  mu.pra = mu.pts + mu.reb + mu.ast;
  // widen SD for small samples (uncertainty in the rate itself), shrinking as n grows
  const nInfl = 1 + 0.5 / Math.sqrt(g.length);
  const sd = {
    pts: Math.max((sdOf(g.map((x) => x.pts)) ?? 5) * nInfl, 3.8),
    reb: Math.max((sdOf(g.map((x) => x.reb)) ?? 2.5) * nInfl, 1.9),
    ast: Math.max((sdOf(g.map((x) => x.ast)) ?? 2) * nInfl, 1.4),
  };
  sd.pra = Math.sqrt(sd.pts ** 2 + sd.reb ** 2 + sd.ast ** 2) * 1.08; // mild positive correlation
  return { n: g.length, minProj, mu, sd, last5Min: mean(last5.map((x) => x.min)) };
}

                <EdgeRow label={`Under ${tt}`} modelP={1 - pOv} marketP={mUn} blendW={effW} price={totU} assumed={o?.totU == null} deviation={totalFlag} onLog={mk(`${g.away.ab}@${g.home.ab}`, `U${tt}`, tt, totU)} />
              </>}
            </tbody>
          </table>
          {!o && <div style={{ color: C.faint, fontSize: 11, marginTop: 6 }}>market line: null (not posted on feed yet)</div>}
          {!conf && <div style={{ color: C.faint, fontSize: 10, marginTop: 6 }}>⚠ thin sample (&lt;8 games) — edges low-confidence; market weight recommended</div>}
        </>
      ) : (
        <div style={{ color: C.faint, fontSize: 12 }}>{ratings ? "team not yet rated (insufficient games)" : "sync season data to rate this game"}</div>
      )}
    </div>
  );
}

/* ---------------- props panel ---------------- */
const MARKETS = [
  { key: "pts", label: "PTS", dist: "norm", step: 1, span: 3 },
  { key: "reb", label: "REB", dist: "norm", step: 1, span: 2 },
  { key: "ast", label: "AST", dist: "norm", step: 1, span: 2 },
  { key: "pra", label: "PRA", dist: "norm", step: 1, span: 3 },
  { key: "tpm", label: "3PM", dist: "pois", step: 1, span: 2 },
];
function lineGrid(mu, span, step) {
  const c = Math.round(mu) + 0.5 - 1; // center-ish .5 line at/just below mu
  const out = [];
  for (let l = c - (span - 1) * step; l <= c + span * step; l += step) if (l > 0) out.push(l);
  return out;
}
function PlayerCard({ p, proj, out, onToggleOut, injury }) {
  const [open, setOpen] = useState(false);
  return (
    <div style={{ ...sCard, padding: 10, opacity: out ? 0.5 : 1 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div onClick={() => setOpen(!open)} style={{ cursor: "pointer" }}>
          <span style={{ fontWeight: 700, fontSize: 13 }}>{p.name}</span>
          <span style={{ color: C.faint, fontSize: 11 }}> {p.pos || ""}</span>
          {injury && <Tag color={/out/i.test(injury.status) ? C.minus : C.warn}>{injury.status}</Tag>}
        </div>
        <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
          {proj && <span style={{ fontFamily: C.mono, fontSize: 11, color: C.dim }}>{f1(proj.adjMin)}m</span>}
          <Btn small onClick={onToggleOut}>{out ? "restore" : "rule out"}</Btn>
        </div>
      </div>
      {proj ? (
        <div style={{ marginTop: 6 }}>
          <div style={{ display: "flex", gap: 12, fontFamily: C.mono, fontSize: 12, flexWrap: "wrap" }}>
            {MARKETS.map((m) => proj.mu[m.key] != null && (
              <span key={m.key}><span style={{ color: C.faint }}>{m.label}</span> <b style={{ color: C.txt }}>{f1(proj.mu[m.key])}</b></span>
            ))}
            <span style={{ color: C.faint, fontSize: 10 }}>n={proj.n}</span>
          </div>
          {open && !out && (
            <div style={{ marginTop: 8, display: "grid", gap: 8 }}>
              {MARKETS.map((m) => {
                const mu = proj.mu[m.key];
                if (mu == null) return null;
                const lines = lineGrid(mu, m.span, m.step);
                return (
                  <div key={m.key}>
                    <div style={{ fontSize: 10, color: C.faint, letterSpacing: ".06em", marginBottom: 3 }}>{m.label} — μ {f1(mu)}{m.dist === "norm" ? ` σ ${f1(proj.sd[m.key])}` : " (poisson)"}</div>
                    <div style={{ display: "flex", gap: 4, overflowX: "auto" }}>
                      {lines.map((L) => {
                        const pO = m.dist === "norm" ? pOverNormal(L, mu, proj.sd[m.key]) : 1 - poisCdf(Math.floor(L), mu);
                        return (
                          <div key={L} style={{ minWidth: 64, background: C.panel2, border: `1px solid ${C.line}`, borderRadius: 6, padding: "4px 6px", textAlign: "center" }}>
                            <div style={{ fontFamily: C.mono, fontSize: 11, color: C.dim }}>{L}</div>
                            <div style={{ fontFamily: C.mono, fontSize: 12, fontWeight: 700, color: pO >= 0.55 ? C.plus : pO <= 0.45 ? C.minus : C.txt }}>{(pO * 100).toFixed(0)}%</div>
                            <div style={{ fontFamily: C.mono, fontSize: 10, color: C.faint }}>{fmtA(p2a(pO))}</div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
              <div style={{ fontSize: 10, color: C.faint }}>% = model P(over) · odds = no-vig fair price. Beat these by your hold threshold at the book.</div>
            </div>
          )}
        </div>
      ) : (
        <div style={{ color: C.faint, fontSize: 11, marginTop: 4 }}>projection: null (fewer than 5 games with minutes — not estimating)</div>
      )}
    </div>
  );
}

function PropsPanel({ game, ratings, gamelogCache, setGamelogCache, injuries }) {
  const [loading, setLoading] = useState(false);
  const [prog, setProg] = useState("");
  const [players, setPlayers] = useState(null); // [{id,name,pos,teamId,teamAb,gl}]
  const [outs, setOuts] = useState({});
  const [err, setErr] = useState(null);

  const load = useCallback(async () => {
    setLoading(true); setErr(null);
    try {
      const tms = [game.home, game.away];
      const rosters = await pool(tms, 2, async (t) => {
        const j = await fjson(ROSTER_URL(t.id));
        let ath = j.athletes || [];
        if (ath.length && ath[0].items) ath = ath.flatMap((g2) => g2.items);
        return ath.map((a) => ({ id: a.id, name: a.fullName || a.displayName, pos: a.position?.abbreviation || null, teamId: t.id, teamAb: t.ab }));
      });
      const all = rosters.flat().filter(Boolean);
      const cache = { ...gamelogCache };
      const today = new Date().toISOString().slice(0, 10);
      const need = all.filter((p) => !cache[p.id] || cache[p.id].d !== today);
      let done = 0;
      await pool(need, 4, async (p) => {
        try {
          const j = await fjson(GL_URL(p.id));
          cache[p.id] = { d: today, gl: parseGamelog(j) };
        } catch (e) { cache[p.id] = { d: today, gl: [] }; }
        done++; setProg(`game logs ${done}/${need.length}`);
      });
      setGamelogCache(cache);
      store.set(K_GL, cache);
      // auto-rule-out players ESPN lists as Out
      const autoOuts = {};
      for (const p of all) {
        const inj = injuries[normName(p.name)];
        if (inj && /^out/i.test(inj.status)) autoOuts[p.id] = true;
      }
      setOuts(autoOuts);
      setPlayers(all.map((p) => ({ ...p, gl: cache[p.id]?.gl || [] })));
    } catch (e) { setErr(String(e.message || e)); }
    setLoading(false); setProg("");
  }, [game, gamelogCache, injuries, setGamelogCache]);

  const computed = useMemo(() => {
    if (!players || !ratings) return null;
    const lg = ratings.lg, lgPace = ratings.lgPace;
    const expPace = clamp(ratings.pace[game.home.id] + ratings.pace[game.away.id] - lgPace, lgPace - 8, lgPace + 8);
    const byTeam = {};
    for (const t of [game.home, game.away]) {
      const oppId = t.id === game.home.id ? game.away.id : game.home.id;
      const dF = clamp(ratings.adjD[oppId] / lg, 0.92, 1.08);
      const teamPace = ratings.pace[t.id] || lgPace;
      const pF = clamp(expPace / teamPace, 0.92, 1.08);
      const tp = players.filter((p) => p.teamId === t.id);
      const base = tp.map((p) => ({ p, proj: projectPlayer(p.gl, { oppDefFactor: dF, paceFactor: pF }) }));
      // minutes redistribution for ruled-out players
      const active = base.filter((x) => x.proj && !outs[x.p.id]);
      const removed = base.filter((x) => x.proj && outs[x.p.id]).reduce((s, x) => s + x.proj.minProj, 0);
      const activeMin = active.reduce((s, x) => s + x.proj.minProj, 0) || 1;
      const minF = removed > 0 ? (activeMin + removed) / activeMin : 1;
      const usageF = removed > 0 ? 1 + 0.25 * (removed / 200) : 1;
      byTeam[t.id] = base
        .map((x) => {
          if (!x.proj) return { ...x, adj: null };
          const adjMin = outs[x.p.id] ? x.proj.minProj : Math.min(x.proj.minProj * minF, 36.5);
          const mf = adjMin / x.proj.minProj;
          const mu = {
            pts: x.proj.mu.pts * mf * usageF,
            reb: x.proj.mu.reb * mf,
            ast: x.proj.mu.ast * mf * usageF,
            tpm: x.proj.mu.tpm == null ? null : x.proj.mu.tpm * mf * usageF,
          };
          mu.pra = mu.pts + mu.reb + mu.ast;
          return { ...x, adj: { ...x.proj, adjMin, mu } };
        })
        .sort((a, b) => (b.adj?.mu.pts ?? -1) - (a.adj?.mu.pts ?? -1));
    }
    return byTeam;
  }, [players, ratings, outs, game]);

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
        <div style={{ fontWeight: 700 }}>{game.away.ab} @ {game.home.ab} — props</div>
        <Btn kind="primary" small onClick={load} disabled={loading}>{loading ? prog || "loading…" : players ? "refresh" : "load rosters + logs"}</Btn>
      </div>
      {err && <div style={{ color: C.minus, fontSize: 12, marginBottom: 8 }}>fetch failed: {err}</div>}
      {!players && !loading && <div style={{ color: C.faint, fontSize: 12 }}>Pulls both rosters and every player's real {SEASON} game log from ESPN, then projects PTS / REB / AST / PRA / 3PM vs this opponent (defense + pace adjusted). Players listed Out are auto-removed and their minutes redistributed.</div>}
      {computed && [game.away, game.home].map((t) => (
        <div key={t.id} style={{ marginBottom: 14 }}>
          <div style={{ fontSize: 11, color: C.accent, letterSpacing: ".08em", margin: "8px 0 6px", fontWeight: 700 }}>{t.name.toUpperCase()}</div>
          {computed[t.id].map(({ p, adj }) => (
            <PlayerCard key={p.id} p={p} proj={adj} out={!!outs[p.id]} injury={injuries[normName(p.name)] || null}
              onToggleOut={() => setOuts((o) => ({ ...o, [p.id]: !o[p.id] }))} />
          ))}
        </div>
      ))}
    </div>
  );
}

/* ---------------- bet log ---------------- */
function LogTab({ log, setLog }) {
  const [closeFor, setCloseFor] = useState(null);
  const [closeVal, setCloseVal] = useState("");
  const [msg, setMsg] = useState(null);
  const settled = log.filter((b) => b.result);
  const units = settled.reduce((s, b) => s + (b.result === "W" ? (a2d(b.odds) - 1) * b.stake : b.result === "L" ? -b.stake : 0), 0);
  const risked = settled.reduce((s, b) => s + (b.result === "P" ? 0 : b.stake), 0);
  const clvs = log.filter((b) => b.clv != null).map((b) => b.clv);
  const briers = settled.filter((b) => b.fairP != null && b.result !== "P");
  const brier = briers.length ? mean(briers.map((b) => ((b.result === "W" ? 1 : 0) - b.fairP) ** 2)) : null;
  const upd = (id, patch) => setLog((L) => L.map((b) => (b.id === id ? { ...b, ...patch } : b)));
  const settle = async (b) => {
    try {
      const d = ymdET(b.gameDate);
      const j = await fjson(SB_URL(d));
      const ev = (j.events || []).find((e) => e.id === b.eventId);
      const pe = ev && parseScoreboardEvent(ev);
      if (!pe || !pe.completed) return setMsg("Game not final yet.");
      const margin = pe.home.pts - pe.away.pts, total = pe.home.pts + pe.away.pts;
      let res = null;
      const s = b.side;
      if (/ML$/.test(s)) res = (s.startsWith(pe.home.ab) ? margin > 0 : margin < 0) ? "W" : "L";
      else if (/^O/.test(s)) res = total > b.line ? "W" : total < b.line ? "L" : "P";
      else if (/^U/.test(s)) res = total < b.line ? "W" : total > b.line ? "L" : "P";
      else { const cov = s.startsWith(pe.home.ab) ? margin + b.line : -margin + b.line; res = cov > 0 ? "W" : cov < 0 ? "L" : "P"; }
      upd(b.id, { result: res, final: `${pe.away.pts}-${pe.home.pts}` });
    } catch (e) { setMsg("Settle fetch failed."); }
  };
  return (
    <div>
      <div style={{ ...sCard, display: "flex", gap: 16, fontFamily: C.mono, fontSize: 12, flexWrap: "wrap" }}>
        <span><span style={{ color: C.faint }}>record</span> <b>{settled.filter((b) => b.result === "W").length}-{settled.filter((b) => b.result === "L").length}</b></span>
        <span><span style={{ color: C.faint }}>units</span> <b style={{ color: units >= 0 ? C.plus : C.minus }}>{(units >= 0 ? "+" : "") + units.toFixed(2)}</b></span>
        <span><span style={{ color: C.faint }}>ROI</span> <b>{risked ? ((units / risked) * 100).toFixed(1) + "%" : "—"}</b></span>
        <span><span style={{ color: C.faint }}>avg CLV</span> <b style={{ color: clvs.length && mean(clvs) > 0 ? C.plus : C.txt }}>{clvs.length ? mean(clvs).toFixed(2) + "%" : "—"}</b></span>
        <span><span style={{ color: C.faint }}>Brier</span> <b>{brier == null ? "—" : brier.toFixed(3)}</b></span>
      </div>
      {msg && <div style={{ ...sCard, color: C.warn, fontSize: 12 }}>{msg}</div>}
      {log.length === 0 && <div style={{ color: C.faint, fontSize: 13 }}>Log +EV plays from the slate cards. Settling pulls the real final score; CLV is computed from the closing price you enter at tip.</div>}
      {[...log].reverse().map((b) => (
        <div key={b.id} style={{ ...sCard, padding: 10 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div style={{ fontSize: 13 }}>
              <b>{b.side}</b> <span style={{ fontFamily: C.mono }}>{fmtA(b.odds)}</span>
              <span style={{ color: C.faint, fontSize: 11 }}> · {b.desc} · {b.stake}u · fair {pct(b.fairP)}</span>
              {b.final && <Tag>{b.final}</Tag>}
            </div>
            <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
              {b.clv != null && <span style={{ fontFamily: C.mono, fontSize: 11, color: b.clv > 0 ? C.plus : C.minus }}>CLV {(b.clv > 0 ? "+" : "") + b.clv.toFixed(1)}%</span>}
              {b.result ? (
                <span style={{ fontFamily: C.mono, fontWeight: 800, color: b.result === "W" ? C.plus : b.result === "L" ? C.minus : C.dim }}>{b.result}</span>
              ) : closeFor === b.id ? (
                <>
                  <input value={closeVal} onChange={(e) => setCloseVal(e.target.value)} placeholder="-118" inputMode="numeric"
                    style={{ width: 64, background: C.panel2, border: `1px solid ${C.line}`, borderRadius: 6, color: C.txt, fontFamily: C.mono, fontSize: 12, padding: "4px 6px" }} />
                  <Btn small kind="primary" onClick={() => { const n = parseInt(closeVal, 10); if (!isNaN(n) && Math.abs(n) >= 100) { upd(b.id, { clv: (a2d(b.odds) / a2d(n) - 1) * 100 }); } setCloseFor(null); setCloseVal(""); }}>set</Btn>
                </>
              ) : (
                <>
                  <Btn small onClick={() => { setCloseFor(b.id); setCloseVal(""); }}>close</Btn>
                  <Btn small onClick={() => settle(b)}>settle</Btn>
                </>
              )}
            </div>
          </div>
        </div>
      ))}
    </div>
  );
}

        </div>

          <div style={{ fontFamily: C.mono, fontSize: 12, lineHeight: 1.6 }}>

            · total: actual ≈ {calib.totalFit ? `${calib.totalFit.a >= 0 ? "+" : ""}${calib.totalFit.a.toFixed(1)} + ${calib.totalFit.b.toFixed(2)}·pred` : "—"} · spread {calib.totalRMSE?.toFixed(1)}<br />

      </div>
      {res && (
        <>
          <div style={{ ...sCard, fontFamily: C.mono, fontSize: 12 }}>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "6px 16px" }}>

              <span><span style={{ color: C.faint }}>margin MAE</span> <b style={{ color: res.marginMAE < 9.5 ? C.plus : res.marginMAE < 11 ? C.warn : C.minus }}>{f1(res.marginMAE)} pts</b></span>
              <span><span style={{ color: C.faint }}>total MAE</span> <b style={{ color: res.totalMAE < 11 ? C.plus : res.totalMAE < 13 ? C.warn : C.minus }}>{f1(res.totalMAE)} pts</b></span>
              <span><span style={{ color: C.faint }}>margin bias</span> <b style={{ color: Math.abs(res.marginBias) < 1 ? C.plus : C.warn }}>{res.marginBias > 0 ? "+" : ""}{f1(res.marginBias)}</b></span>
              <span><span style={{ color: C.faint }}>total bias</span> <b style={{ color: Math.abs(res.totalBias) < 1.5 ? C.plus : C.warn }}>{res.totalBias > 0 ? "+" : ""}{f1(res.totalBias)}</b></span>

              <span><span style={{ color: C.faint }}>pred/act corr</span> <b style={{ color: res.corr > 0.4 ? C.plus : res.corr > 0.25 ? C.warn : C.minus }}>{res.corr == null ? "—" : res.corr.toFixed(2)}</b></span>
            </div>
          </div>
          <div style={sCard}>
            <div style={{ fontSize: 11, color: C.faint, letterSpacing: ".06em", marginBottom: 8 }}>WIN-PROBABILITY CALIBRATION (home)</div>
            <table style={{ width: "100%", borderCollapse: "collapse" }}>
              <thead><tr><th style={{ ...sTh, textAlign: "left" }}>predicted</th><th style={sTh}>actual</th><th style={sTh}>n</th><th style={sTh}>miss</th></tr></thead>
              <tbody>{res.buckets.map((b, i) => (
                <tr key={i} style={{ borderTop: `1px solid ${C.line}` }}>
                  <td style={{ ...sTd, textAlign: "left" }}>{(b.pred * 100).toFixed(0)}%</td>
                  <td style={sTd}>{(b.act * 100).toFixed(0)}%</td>
                  <td style={sTd}>{b.n}</td>
                  <td style={{ ...sTd, color: Math.abs(b.pred - b.act) < 0.08 ? C.plus : Math.abs(b.pred - b.act) < 0.15 ? C.warn : C.minus }}>{((b.pred - b.act) * 100).toFixed(0)}</td>
                </tr>
              ))}</tbody>
            </table>
            <div style={{ fontSize: 10, color: C.faint, marginTop: 8, lineHeight: 1.5 }}>
              Reference: a decent WNBA margin model lands ~9–11 MAE; SU accuracy ~65–70%; bias near 0 means no systematic lean. Calibration "miss" near 0 means stated probabilities are honest. These reflect the core engine only — historical injury/rest data isn't reconstructable, so live edges (with availability) should beat these.
            </div>
          </div>
        </>
      )}
    </div>
  );
}

/* ---------------- model picks (ranked recommendations) ---------------- */
function computePicks(slate, sims, ratings, blendW, minEV) {
  const picks = [];
  for (const g of slate) {
    if (g.state !== "pre") continue;
    const sim = sims[g.id]; const o = g.odds;
    if (!sim || !o) continue;
    const adj = sim.adj || {};
    const injTotal = (adj.hInjPts || 0) + (adj.aInjPts || 0);
    const effW = blendW * clamp(1 - injTotal / 16, 0.2, 1);
    const conf = (ratings?.gp?.[g.home.id] ?? 0) >= 8 && (ratings?.gp?.[g.away.id] ?? 0) >= 8;
    const sp = o.spread, tt = o.total;
    const spreadFlag = sp != null && effW * Math.abs(sim.fairSpread - sp) > 5;
    const totalFlag = tt != null && effW * Math.abs(sim.fairTotal - tt) > 5;
    const add = (mk, side, label, line, price, modelP, marketP, flag) => {
      if (price == null || flag) return;
      const p = marketP != null ? effW * modelP + (1 - effW) * marketP : modelP;
      const ev = evPct(p, price);
      if (ev == null || ev < minEV) return;
      picks.push({ gid: g.id, game: `${g.away.ab} @ ${g.home.ab}`, time: g.date, desc: `${g.away.ab}@${g.home.ab}`, mk, side, label, line, price, p, ev, kelly: kellyQ(p, price), conf });
    };
    if (o.mlH != null && o.mlA != null) {
      const [mH, mA] = devig2(o.mlH, o.mlA);
      add("ml", `${g.home.ab} ML`, `${g.home.ab} ML`, null, o.mlH, sim.pHomeML, mH, spreadFlag);
      add("ml", `${g.away.ab} ML`, `${g.away.ab} ML`, null, o.mlA, 1 - sim.pHomeML, mA, spreadFlag);
    }
    if (sp != null) {
      const spH = o.spH ?? -110, spA = o.spA ?? -110;
      const [mSH, mSA] = devig2(spH, spA);
      const pC = sim.pHomeCover(sp);
      add("spread", `${g.home.ab} ${sp}`, `${g.home.ab} ${sp > 0 ? "+" : ""}${sp}`, sp, spH, pC, mSH, spreadFlag);
      add("spread", `${g.away.ab} ${-sp}`, `${g.away.ab} ${-sp > 0 ? "+" : ""}${-sp}`, -sp, spA, 1 - pC, mSA, spreadFlag);
    }
    if (tt != null) {
      const tO = o.totO ?? -110, tU = o.totU ?? -110;
      const [mO, mU] = devig2(tO, tU);
      const pO = sim.pOver(tt);
      add("total", `O${tt}`, `Over ${tt}`, tt, tO, pO, mO, totalFlag);
      add("total", `U${tt}`, `Under ${tt}`, tt, tU, 1 - pO, mU, totalFlag);
    }
  }
  picks.sort((a, b) => b.ev - a.ev);
  return picks;
}
const pickTier = (ev, conf) => (ev >= 3 && conf ? { t: "A", c: "#3fd0a4" } : ev >= 1.5 ? { t: "B", c: "#3fd0a4" } : { t: "C", c: "#e8b452" });

              <div style={{ fontFamily: C.mono, fontSize: 10, color: C.faint }}>{p.game} · {pct(p.p)} · {p.kelly ? p.kelly.toFixed(2) : "—"}u{!p.conf ? " · thin" : ""}</div>

      })}
      {picks.length > 0 && (
        <div style={{ fontSize: 10, color: C.faint, marginTop: 4, lineHeight: 1.5 }}>
          Picks are model-vs-posted-line edges after blending to market, deferring on public injuries, and excluding games where the model deviates &gt;7 pts. Shop each number across your books before firing — a better price only improves the edge.
        </div>
      )}

}

/* ---------------- model ledger tab ---------------- */
function LedgerTab({ ledger }) {
  const entries = Object.values(ledger).sort((a, b) => b.date.localeCompare(a.date));
  const rows = [];
  for (const e of entries) for (const [mk, m] of Object.entries(e.mkts)) {
    const clv = mk === "ml" ? mlClvPct(m) : mk === "spread" ? spreadClvPts(m) : totalClvPts(m);
    rows.push({ e, mk, m, clv, unit: mk === "ml" ? "%" : "pt" });
  }
  const beat = rows.filter((r) => r.clv != null && r.clv > 0.0001).length;
  const clvN = rows.filter((r) => r.clv != null && (r.e.started || r.e.final)).length;
  const spreadClvs = rows.filter((r) => r.mk === "spread" && (r.e.started || r.e.final)).map((r) => r.clv);
  const totalClvs = rows.filter((r) => r.mk === "total" && (r.e.started || r.e.final)).map((r) => r.clv);
  const mlClvs = rows.filter((r) => r.mk === "ml" && r.clv != null && (r.e.started || r.e.final)).map((r) => r.clv);
  const settled = rows.filter((r) => r.m.result);
  const w = settled.filter((r) => r.m.result === "W").length;
  const l = settled.filter((r) => r.m.result === "L").length;
  const p = settled.filter((r) => r.m.result === "P").length;
  const roi = (() => {
    let u = 0, risk = 0;
    for (const r of settled) {
      if (r.m.result === "P") continue;
      const price = r.mk === "ml" ? (r.m.side === "H" ? r.m.openH : r.m.openA) : r.m.openPrice;
      risk += 1;
      u += r.m.result === "W" ? a2d(price) - 1 : -1;
    }
    return risk ? (u / risk) * 100 : null;
  })();
  const beatRate = clvN ? (beat / clvN) * 100 : null;
  const lab = (mk, m) => mk === "ml" ? `${m.side === "H" ? "home" : "away"} ML` : mk === "spread" ? `${m.side === "H" ? "home" : "away"} spread` : `${m.side === "O" ? "over" : "under"}`;
  return (
    <div>
      <div style={{ ...sCard }}>
        <div style={{ fontSize: 12, color: C.dim, marginBottom: 10, lineHeight: 1.5 }}>
          Every slate game's model pick is captured automatically at the price showing when first seen, the line is frozen at tip, and the result is graded against the <b>closing</b> number. No manual entry, no selection bias — this is the model on trial. <b>Beat-close rate &gt;52–55% and positive average CLV is the real proof of an edge.</b>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "8px 16px", fontFamily: C.mono, fontSize: 12 }}>
          <span><span style={{ color: C.faint }}>positions</span> <b>{rows.length}</b> <span style={{ color: C.faint }}>({clvN} closed)</span></span>
          <span><span style={{ color: C.faint }}>beat close</span> <b style={{ color: beatRate == null ? C.dim : beatRate >= 55 ? C.plus : beatRate >= 50 ? C.warn : C.minus }}>{beatRate == null ? "—" : beatRate.toFixed(0) + "%"}</b></span>
          <span><span style={{ color: C.faint }}>spread CLV</span> <b style={{ color: spreadClvs.length && mean(spreadClvs) > 0 ? C.plus : C.txt }}>{spreadClvs.length ? (mean(spreadClvs) > 0 ? "+" : "") + mean(spreadClvs).toFixed(2) + "pt" : "—"}</b></span>
          <span><span style={{ color: C.faint }}>total CLV</span> <b style={{ color: totalClvs.length && mean(totalClvs) > 0 ? C.plus : C.txt }}>{totalClvs.length ? (mean(totalClvs) > 0 ? "+" : "") + mean(totalClvs).toFixed(2) + "pt" : "—"}</b></span>
          <span><span style={{ color: C.faint }}>ML CLV</span> <b style={{ color: mlClvs.length && mean(mlClvs) > 0 ? C.plus : C.txt }}>{mlClvs.length ? (mean(mlClvs) > 0 ? "+" : "") + mean(mlClvs).toFixed(1) + "%" : "—"}</b></span>
          <span><span style={{ color: C.faint }}>vs close</span> <b>{w}-{l}{p ? `-${p}` : ""}</b> <span style={{ color: roi == null ? C.dim : roi >= 0 ? C.plus : C.minus }}>{roi == null ? "" : (roi >= 0 ? "+" : "") + roi.toFixed(1) + "% ROI"}</span></span>
        </div>
      </div>
      {rows.length === 0 && <div style={{ color: C.faint, fontSize: 13 }}>No positions captured yet. Sync with games on the slate and the ledger fills automatically — keep syncing through tip and after finals to record closing lines and results.</div>}
      {entries.map((e) => (
        <div key={e.gid} style={{ ...sCard, padding: 10 }}>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
            <span style={{ fontWeight: 700, fontSize: 13 }}>{e.away} @ {e.home}</span>
            <span style={{ fontFamily: C.mono, fontSize: 11, color: e.final ? C.dim : e.started ? C.warn : C.plus }}>{e.final ? `final ${e.score}` : e.started ? "in progress" : "open"}</span>
          </div>
          {Object.entries(e.mkts).map(([mk, m]) => {
            const clv = mk === "ml" ? mlClvPct(m) : mk === "spread" ? spreadClvPts(m) : totalClvPts(m);
            const open = mk === "ml" ? `${fmtA(m.side === "H" ? m.openH : m.openA)}` : mk === "spread" ? `${m.openSp > 0 ? "+" : ""}${m.openSp} ${fmtA(m.openPrice)}` : `${m.openTot} ${fmtA(m.openPrice)}`;
            const close = !e.started ? "—" : mk === "ml" ? `${fmtA(m.side === "H" ? m.closeH ?? m.lastH : m.closeA ?? m.lastA)}` : mk === "spread" ? `${(m.closeSp ?? m.lastSp) > 0 ? "+" : ""}${m.closeSp ?? m.lastSp}` : `${m.closeTot ?? m.lastTot}`;
            return (
              <div key={mk} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", fontFamily: C.mono, fontSize: 11, padding: "3px 0", borderTop: `1px solid ${C.line}` }}>
                <span style={{ color: C.txt, minWidth: 90 }}>{lab(mk, m)}</span>
                <span style={{ color: C.faint }}>{open} → {close}</span>
                <span style={{ color: clv == null ? C.dim : clv > 0 ? C.plus : clv < 0 ? C.minus : C.dim, fontWeight: 700, minWidth: 60, textAlign: "right" }}>
                  {clv == null || !e.started ? "—" : `${clv > 0 ? "+" : ""}${clv.toFixed(mk === "ml" ? 1 : 2)}${mk === "ml" ? "%" : "pt"}`}
                </span>
                <span style={{ fontWeight: 800, minWidth: 18, textAlign: "right", color: m.result === "W" ? C.plus : m.result === "L" ? C.minus : C.dim }}>{m.result || ""}</span>
              </div>
            );
          })}
        </div>
      ))}
    </div>
  );
}

/* ---------------- root ---------------- */
function App() {
  const [tab, setTab] = useState("picks");
  const [games, setGames] = useState([]); // completed cache
  const [slate, setSlate] = useState([]);
  const [ratings, setRatings] = useState(null);
  const [lines, setLines] = useState(null);
  const [live, setLive] = useState(false);
  const [sync, setSync] = useState({ busy: false, msg: "", last: null, err: null });
  const [log, setLogState] = useState([]);
  const [glCache, setGlCache] = useState({});
  const [injuries, setInjuries] = useState({});
  const [rosters, setRosters] = useState({}); // teamId -> [{id,name,pos}]
  const [blendW, setBlendW] = useState(0.6);   // model weight; remainder = market weight
  const [srProxy, setSrProxy] = useState("");
  const [injStatus, setInjStatus] = useState(null);
  const [ledger, setLedger] = useState({});     // auto CLV-vs-close ledger
  const [calib, setCalib] = useState(null);     // self-calibration from walk-forward backtest
  const [propsGame, setPropsGame] = useState(null);

  const adjustments = useMemo(() => {
    const m = {};
    for (const g of slate) m[g.id] = gameAdjustments(g, ratings, glCache, injuries, rosters);
    return m;
  }, [slate, ratings, glCache, injuries, rosters]);

  const sims = useMemo(() => {
    if (!ratings) return {};
    const m = {};
    for (const g of slate) { const s = simGame(ratings, g.home.id, g.away.id, adjustments[g.id] || {}, calib); if (s) m[g.id] = s; }
    return m;
  }, [slate, ratings, adjustments, calib]);

  // self-calibration: recompute the model's out-of-sample error whenever the game set changes
  useEffect(() => {
    if (!games.length) return;
    const finals = games.filter((g) => g.hPts != null && g.hPoss && g.aPoss).length;
    if (finals < 30) { setCalib(null); return; }
    const id = setTimeout(() => {
      const bt = runBacktest(games);
      if (bt && bt.n >= 30) {
        const c = { marginFit: bt.marginFit, totalFit: bt.totalFit, marginBias: bt.marginBias, totalBias: bt.totalBias, marginRMSE: bt.marginRMSE, totalRMSE: bt.totalRMSE, n: bt.n, ts: Date.now() };
        setCalib(c); store.set(K_CALIB, c);
      }
    }, 50);
    return () => clearTimeout(id);
  }, [games]);

  const setLog = (fn) => setLogState((L) => { const n = typeof fn === "function" ? fn(L) : fn; store.set(K_LOG, n); return n; });

  useEffect(() => {
    (async () => {
      const [g, l, gl, rs, ld] = await Promise.all([store.get(K_GAMES), store.get(K_LOG), store.get(K_GL), store.get(K_ROSTERS), store.get(K_LEDGER)]);
      if (g?.games) { setGames(g.games); const rt = buildRatings(g.games); setRatings(rt); }
      if (l) setLogState(l);
      if (gl) setGlCache(gl);
      if (rs) setRosters(rs);
      if (ld) setLedger(ld);
      const cb = await store.get(K_CALIB); if (cb) setCalib(cb);
      const sp = await store.get(K_SRPROXY); if (sp) setSrProxy(sp);
    })();
  }, []);

  // auto-capture model picks + closing lines + results for every slate game (unbiased)
  useEffect(() => {
    if (!slate.length) return;
    setLedger((prev) => updateLedger(prev, slate, sims));
  }, [slate, sims]);
  useEffect(() => {
    if (Object.keys(ledger).length) store.set(K_LEDGER, ledger);
  }, [ledger]);

  const runSync = useCallback(async () => {
    setSync({ busy: true, msg: "calendar…", last: null, err: null });
    try {
      const cached = (await store.get(K_GAMES)) || { games: [], lastDate: null };
      const today = todayET();
      const tomorrow = addDaysYmd(today, 1);
      const from = cached.lastDate ? cached.lastDate : SEASON_START.replace(/-/g, "");
      // ESPN's own league calendar drives the date list — no missed game dates, no wasted calls
      const probe = await fjson(SB_URL(today));
      const cal = (probe.leagues?.[0]?.calendar || [])
        .map((c) => ymdET(typeof c === "string" ? c : c.startDate || c))
        .filter((d) => d >= from && d <= tomorrow);
      const dates = [...new Set([...(cal.length ? cal : dateRange(from, today)), today, tomorrow])].sort();
      const sbs = await pool(dates, 6, (d) => fjson(SB_URL(d)), (d, t) => setSync((s) => ({ ...s, msg: `scoreboards ${d}/${t}` })));
      const failed = sbs.filter((x) => x == null).length;
      const byId = Object.fromEntries(cached.games.map((g) => [g.id, g]));
      const slateEvts = {};
      const needBox = [];
      for (let i = 0; i < sbs.length; i++) {
        for (const ev of sbs[i]?.events || []) {
          const pe = parseScoreboardEvent(ev);
          if (!isModelGame(pe)) continue;
          if (pe.d >= today) slateEvts[pe.id] = pe;
          // fetch box for new finals AND retry any cached game whose box never parsed
          const existing = byId[pe.id];
          if (pe.completed && (!existing || existing.hPoss == null || existing.aPoss == null)) needBox.push(pe);
        }
      }
      setSync((s) => ({ ...s, msg: `box scores 0/${needBox.length}` }));
      const sums = await pool(needBox, 5, (g) => fjson(SUM_URL(g.id)), (d, t) => setSync((s) => ({ ...s, msg: `box scores ${d}/${t}` })));
      needBox.forEach((g, i) => {
        let hPoss = null, aPoss = null;
        const bt = sums[i]?.boxscore?.teams;
        if (bt) for (const t of bt) {
          const poss = teamPossFromBox(t.statistics || []);
          if (String(t.team.id) === String(g.home.id)) hPoss = poss; else aPoss = poss;
        }
        byId[g.id] = { id: g.id, date: g.date, d: g.d, hId: g.home.id, hAb: g.home.ab, hPts: g.home.pts, aId: g.away.id, aAb: g.away.ab, aPts: g.away.pts, hPoss, aPoss };
      });
      const allGames = Object.values(byId).sort((a, b) => a.date.localeCompare(b.date));
      // lastDate = today (not tomorrow) so tonight's finals are re-checked on the next sync
      if (failed === 0) await store.set(K_GAMES, { games: allGames, lastDate: today });
      setGames(allGames);
      setRatings(buildRatings(allGames));
      setSlate(Object.values(slateEvts).sort((a, b) => a.date.localeCompare(b.date)));
      setLines(new Date().toLocaleTimeString([], { hour: "numeric", minute: "2-digit" }));
      try {
        const ij = await fjson(INJ_URL);
        const map = {};
        for (const t of ij.injuries || []) for (const inj of t.injuries || []) {
          const nm = inj.athlete?.displayName; if (nm) map[normName(nm)] = { status: normStatus(inj.status || inj.type?.description || "listed"), src: "ESPN" };
        }
        // SportRadar overlay (higher quality) via secure proxy, if configured
        let srCount = 0;
        const proxy = await store.get(K_SRPROXY);
        if (proxy) {
          try {
            const srJson = await fjson(proxy);
            const srMap = parseSRInjuries(srJson);
            srCount = Object.keys(srMap).length;
            Object.assign(map, srMap); // SR wins on conflicts
          } catch (e) { srCount = -1; /* proxy unreachable */ }
        }
        setInjuries(map);
        setInjStatus({ espn: Object.values(map).filter((v) => v.src === "ESPN").length, sr: srCount });
      } catch (e) { /* injury feed optional */ }
      // rosters + game logs for slate teams -> enables injury-adjusted team strength in the game model
      try {
        const slateGames = Object.values(slateEvts);
        const teamIds = [...new Set(slateGames.flatMap((g) => [g.home.id, g.away.id]))];
        if (teamIds.length) {
          setSync((s) => ({ ...s, msg: `rosters 0/${teamIds.length}` }));
          const rCache = (await store.get(K_ROSTERS)) || {};
          let rd = 0;
          const ros = await pool(teamIds, 4, async (tid) => {
            const j = await fjson(ROSTER_URL(tid));
            let ath = j.athletes || [];
            if (ath.length && ath[0].items) ath = ath.flatMap((x) => x.items);
            rd++; setSync((s) => ({ ...s, msg: `rosters ${rd}/${teamIds.length}` }));
            return ath.map((a) => ({ id: a.id, name: a.fullName || a.displayName, pos: a.position?.abbreviation || null }));
          });
          const rmap = { ...rCache };
          teamIds.forEach((tid, i) => { if (ros[i]) rmap[tid] = ros[i]; });
          setRosters(rmap); await store.set(K_ROSTERS, rmap);
          const todayISO = new Date().toISOString().slice(0, 10);
          const glc = { ...(await store.get(K_GL)) };
          const players = teamIds.flatMap((tid) => rmap[tid] || []);
          const need = players.filter((p) => !glc[p.id] || glc[p.id].d !== todayISO);
          let gd = 0;
          await pool(need, 6, async (p) => {
            try { const j = await fjson(GL_URL(p.id)); glc[p.id] = { d: todayISO, gl: parseGamelog(j) }; }
            catch (e) { glc[p.id] = { d: todayISO, gl: [] }; }
            gd++; setSync((s) => ({ ...s, msg: `player logs ${gd}/${need.length}` }));
          });
          setGlCache(glc); await store.set(K_GL, glc);
        }
      } catch (e) { /* injury-adjustment falls back to 0; flagged in UI */ }
      setSync({
        busy: false, msg: "",
        last: new Date().toLocaleTimeString([], { hour: "numeric", minute: "2-digit" }),
        err: failed > 0 ? `${failed} scoreboard date(s) failed to load — cache checkpoint NOT advanced, so nothing is silently missing. Sync again.` : null,
      });
    } catch (e) {
      setSync({ busy: false, msg: "", last: null, err: "Sync failed — ESPN feed unreachable. No estimated data was substituted." });
    }
  }, []);

  // lightweight line refresh: re-pulls today + tomorrow scoreboards only (2 calls)
  const refreshLines = useCallback(async () => {
    try {
      const t = todayET(), tm = addDaysYmd(t, 1);
      const sbs = await Promise.all([fjson(SB_URL(t)), fjson(SB_URL(tm))]);
      const evts = {};
      for (const sb of sbs) for (const ev of sb.events || []) {
        const pe = parseScoreboardEvent(ev);
        if (isModelGame(pe) && pe.d >= t) evts[pe.id] = pe;
      }
      setSlate(Object.values(evts).sort((a, b) => a.date.localeCompare(b.date)));
      setLines(new Date().toLocaleTimeString([], { hour: "numeric", minute: "2-digit", second: "2-digit" }));
    } catch (e) { /* keep last known lines */ }
  }, []);

  useEffect(() => {
    if (!live) return;
    const id = setInterval(() => { if (document.visibilityState === "visible") refreshLines(); }, 90000);
    return () => clearInterval(id);
  }, [live, refreshLines]);

  const addBet = (b) => {
    const stake = b.fairP != null && b.odds != null ? Math.max(0.25, Math.round((kellyQ(b.fairP, b.odds) || 1) * 4) / 4) : 1;
    setLog((L) => [...L, { ...b, id: Date.now() + Math.random(), ts: new Date().toISOString(), stake, result: null, clv: null }]);
  };

  const tabs = [
    ["picks", "Picks"], ["slate", "Slate"], ["ratings", "Ratings"], ["props", "Props"], ["validate", "Validate"], ["model", "Model"], ["log", `Log${log.length ? ` (${log.length})` : ""}`],
  ];

  return (
    <div style={{ minHeight: "100vh", background: C.bg, color: C.txt, fontFamily: C.sans, padding: "14px 12px 60px" }}>
      <div style={{ maxWidth: 720, margin: "0 auto" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
          <div>
            <div style={{ fontWeight: 800, fontSize: 17, letterSpacing: "-0.01em" }}>WNBA SHARP <span style={{ color: C.accent }}>{SEASON}</span> <span style={{ fontSize: 10, color: C.plus, fontFamily: C.mono, fontWeight: 700, border: `1px solid ${C.plus}`, borderRadius: 4, padding: "1px 5px", verticalAlign: "middle" }}>build 13 · dev-fix</span></div>
            <div style={{ fontSize: 10, color: C.faint, fontFamily: C.mono }}>
              {games.length ? `${games.length} games synced` : "no data yet"}{sync.last ? ` · synced ${sync.last}` : ""}
            </div>
          </div>
          <Btn kind="primary" onClick={runSync} disabled={sync.busy}>{sync.busy ? sync.msg || "syncing…" : "Sync"}</Btn>
        </div>
        {sync.err && <div style={{ ...sCard, color: C.minus, fontSize: 12 }}>{sync.err}</div>}
        <div style={{ display: "flex", gap: 6, marginBottom: 12, overflowX: "auto" }}>
          {tabs.map(([k, l]) => (
            <button key={k} onClick={() => setTab(k)} style={{
              border: "none", borderBottom: tab === k ? `2px solid ${C.accent}` : "2px solid transparent",
              background: "transparent", color: tab === k ? C.txt : C.dim, fontWeight: 700, fontSize: 13, padding: "6px 10px", cursor: "pointer", whiteSpace: "nowrap",
            }}>{l}</button>
          ))}
        </div>

        {tab === "slate" && (
          <div>
            {!games.length && !sync.busy && (
              <div style={sCard}>
                <div style={{ fontSize: 13, lineHeight: 1.5 }}>
                  Tap <b>Sync</b>. It pulls every {SEASON} result + box score from ESPN, builds opponent-adjusted per-100 ratings and pace, then runs 10k-sim Monte Carlo on today's slate against the posted market (devigged multiplicatively). All persistent — next sync only fetches new games.
                </div>
              </div>
            )}
            {slate.length === 0 && games.length > 0 && !sync.busy && <div style={{ color: C.faint, fontSize: 13 }}>No games today or tomorrow per ESPN's league calendar.</div>}
            {slate.length > 0 && (
              <div style={{ ...sCard, padding: 10 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                  <span style={{ fontSize: 10, color: C.faint, fontFamily: C.mono }}>{lines ? `lines as of ${lines}` : ""}</span>
                  <div style={{ display: "flex", gap: 6 }}>
                    <Btn small onClick={refreshLines}>refresh lines</Btn>
                    <Btn small kind={live ? "primary" : "ghost"} onClick={() => setLive(!live)}>{live ? "live: on" : "live: off"}</Btn>
                  </div>
                </div>
                <div style={{ display: "flex", gap: 6, alignItems: "center", flexWrap: "wrap" }}>
                  <span style={{ fontSize: 10, color: C.faint, letterSpacing: ".06em" }}>BELIEF</span>
                  {[["Model", 1], ["Blend", 0.6], ["Market", 0]].map(([lbl, w]) => (
                    <Btn key={lbl} small kind={Math.abs(blendW - w) < 0.01 ? "primary" : "ghost"} onClick={() => setBlendW(w)}>{lbl}</Btn>
                  ))}
                  <span style={{ fontSize: 10, color: C.faint, fontFamily: C.mono }}>
                    {blendW === 1 ? "pure model" : blendW === 0 ? "pure no-vig market" : `${Math.round(blendW * 100)}% model / ${Math.round((1 - blendW) * 100)}% market`}
                  </span>
                </div>
                <div style={{ display: "flex", gap: 6, alignItems: "center", flexWrap: "wrap", marginTop: 8, paddingTop: 8, borderTop: `1px solid ${C.line}` }}>
                  <span style={{ fontSize: 10, color: C.faint, letterSpacing: ".06em" }}>INJURIES</span>
                  <input value={srProxy} onChange={(e) => setSrProxy(e.target.value)} placeholder="SportRadar proxy URL (optional)"
                    style={{ flex: 1, minWidth: 160, background: C.panel2, border: `1px solid ${C.line}`, borderRadius: 6, color: C.txt, fontFamily: C.mono, fontSize: 11, padding: "5px 7px" }} />
                  <Btn small kind="primary" onClick={() => { store.set(K_SRPROXY, srProxy.trim()); }}>save</Btn>
                  <span style={{ fontSize: 10, color: C.faint, fontFamily: C.mono }}>
                    {injStatus == null ? "ESPN feed" : `ESPN ${injStatus.espn}${injStatus.sr > 0 ? ` · SR ${injStatus.sr} ✓` : injStatus.sr === -1 ? " · SR proxy unreachable" : ""}`}
                  </span>
                </div>
              </div>
            )}
            {[["TODAY", slate.filter((g) => g.d === todayET())], ["TOMORROW", slate.filter((g) => g.d > todayET())]].map(([lbl, gs]) => gs.length > 0 && (
              <div key={lbl}>
                <div style={{ fontSize: 10, color: C.accent, letterSpacing: ".1em", fontWeight: 700, margin: "10px 0 6px" }}>{lbl} · {gs.length} GAME{gs.length > 1 ? "S" : ""}</div>
                {gs.map((g) => g.state !== "pre" ? (
                  <div key={g.id} style={{ ...sCard, padding: 10, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <span style={{ fontSize: 13, fontWeight: 700 }}>{g.away.ab} {g.away.pts ?? ""} — {g.home.pts ?? ""} {g.home.ab}</span>
                    <span style={{ fontFamily: C.mono, fontSize: 11, color: g.completed ? C.dim : C.plus, fontWeight: 700 }}>{g.completed ? "FINAL" : `LIVE · ${g.statusTxt}`}</span>
                  </div>
                ) : (
                  <GameCard key={g.id} g={g} sim={sims[g.id]} ratings={ratings} blendW={blendW} onLogBet={addBet}
                    onOpenProps={(gm) => { setPropsGame(gm); setTab("props"); }} />
                ))}
              </div>
            ))}
          </div>
        )}
        {tab === "picks" && <PicksTab slate={slate} sims={sims} ratings={ratings} blendW={blendW} onLog={addBet} />}
        {tab === "ratings" && <RatingsTab ratings={ratings} games={games} />}
        {tab === "validate" && <ValidationTab games={games} calib={calib} />}
        {tab === "model" && <LedgerTab ledger={ledger} />}
        {tab === "props" && (
          propsGame ? (
            <div>
              <div style={{ display: "flex", gap: 6, marginBottom: 10, overflowX: "auto" }}>
                {slate.map((g) => (
                  <Btn key={g.id} small kind={propsGame.id === g.id ? "primary" : "ghost"} onClick={() => setPropsGame(g)}>{g.away.ab}@{g.home.ab}</Btn>
                ))}
              </div>
              <PropsPanel key={propsGame.id} game={propsGame} ratings={ratings} gamelogCache={glCache} setGamelogCache={setGlCache} injuries={injuries} />
            </div>
          ) : (
            <div style={{ color: C.faint, fontSize: 13 }}>{slate.length ? "Pick a game:" : "Sync first — props load per game from the slate."}
              <div style={{ display: "flex", gap: 6, marginTop: 8, flexWrap: "wrap" }}>
                {slate.map((g) => <Btn key={g.id} small onClick={() => setPropsGame(g)}>{g.away.ab}@{g.home.ab}</Btn>)}
              </div>
            </div>
          )
        )}
        {tab === "log" && <LogTab log={log} setLog={setLog} />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script></body></html>
